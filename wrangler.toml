# Cloudflare Pages runs on the Workers runtime. Use either:
#   • Dashboard: Workers & Pages → Create → Connect to Git → repo, branch, build command, output dir
#   • CLI: npm run build && npx wrangler pages deploy dist --project-name=YOUR_PROJECT_NAME
#
# Build command: npm run build
# Build output directory: dist
# Node version in Pages: 20.x (set in Pages → Settings → Environment variables, or use .nvmrc)

name = "onpath"
compatibility_date = "2024-11-01"
pages_build_output_dir = "dist"
